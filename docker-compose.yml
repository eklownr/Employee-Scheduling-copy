services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - docker.env
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - docker.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employee_scheduler -d employee_scheduling"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
